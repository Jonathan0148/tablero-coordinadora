spring:
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
    username: ${DB_USERNAME:APP_CURSOR}
    password: ${DB_PASSWORD:AppCursor123}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: ItDashboardHikariPool
  jpa:
    show-sql: false

app:
  errors:
    expose-details: true

logging:
  level:
    com.coltefinanciera.itdashboard: INFO
    com.coltefinanciera.itdashboard.identity: DEBUG
    com.coltefinanciera.itdashboard.shared.exception: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
